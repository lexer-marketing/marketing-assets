<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexer: See It in Action (Demo Embed)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #00BEB7;
  --dark-teal: #087680;
  --bright-teal: #00E2AA;
  --dark-grey: #3A405B;
  --light-fawn: #F7F6F5;
  --fawn: #ECE8E5;
  --dark-fawn: #A09891;
  --light-grey: #B9BED1;
}

body {
  font-family: 'Rubik', sans-serif;
  background: transparent;
  color: var(--dark-grey);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding: 48px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.btn-ghost {
  font-family: 'Rubik', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--dark-grey);
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 8px;
  transition: background 0.15s;
  text-decoration: none;
}
.btn-ghost:hover { background: var(--fawn); }

.btn-primary {
  font-family: 'Rubik', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #fff;
  background: var(--dark-grey);
  border: none;
  cursor: pointer;
  padding: 9px 20px;
  border-radius: 8px;
  transition: background 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary:hover { background: #2e3349; }

/* ── Section wrapper ── */
.demo-section {
  max-width: 1100px;
  margin: 0 auto;
}

/* ── Section header ── */
.section-label {
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dark-fawn);
  margin-bottom: 12px;
}
.section-title {
  text-align: center;
  font-size: 32px;
  font-weight: 600;
  color: var(--dark-grey);
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.section-sub {
  text-align: center;
  font-size: 16px;
  color: var(--dark-fawn);
  max-width: 620px;
  margin: 0 auto 40px;
}

/* ── Category tabs ── */
.cat-tabs {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}
.cat-tab {
  font-family: 'Rubik', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--dark-grey);
  background: #fff;
  border: 1px solid var(--fawn);
  border-radius: 100px;
  padding: 9px 22px;
  cursor: pointer;
  transition: all 0.15s;
}
.cat-tab:hover { border-color: var(--teal); color: var(--teal); }
.cat-tab.active {
  background: var(--dark-grey);
  border-color: var(--dark-grey);
  color: #fff;
  font-weight: 500;
}

/* ── Demo stage ── */
.demo-stage {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 0;
  align-items: stretch;
  background: #fff;
  border: 1px solid #E2E4EA;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(58,64,91,0.10);
}

/* ── Previous chats nav ── */
.chat-nav {
  background: var(--light-fawn);
  border-right: 1px solid var(--fawn);
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
}
.chat-nav-logo {
  height: 22px;
  width: auto;
  align-self: flex-start;
  margin: 4px 8px 16px;
  display: block;
}
.chat-nav-new {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Rubik', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--dark-grey);
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 8px;
  border-radius: 8px;
  transition: background 0.12s;
  margin-bottom: 8px;
}
.chat-nav-new:hover { background: var(--fawn); }
.chat-nav-new-icon {
  width: 26px; height: 26px;
  background: var(--teal);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.chat-nav-label {
  font-size: 12px;
  font-weight: 400;
  color: var(--dark-fawn);
  padding: 4px 8px;
  margin-bottom: 2px;
}
.chat-nav-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.chat-nav-item {
  padding: 8px 8px;
  font-size: 13.5px;
  color: #6b7190;
  cursor: pointer;
  line-height: 1.35;
  border-radius: 8px;
  transition: background 0.12s, color 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-nav-item:hover {
  background: var(--fawn);
  color: var(--dark-grey);
}
.chat-nav-item.active {
  background: var(--fawn);
  color: var(--dark-grey);
  font-weight: 500;
}
.chat-nav-item.placeholder { color: var(--light-grey); }

/* ── Empty / placeholder chat state ── */
.lexi-empty {
  margin: auto;
  text-align: center;
  max-width: 320px;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.lexi-empty-icon { opacity: 0.5; margin-bottom: 4px; }
.lexi-empty-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--dark-grey);
}
.lexi-empty-sub {
  font-size: 13.5px;
  color: var(--dark-fawn);
  line-height: 1.5;
}
.lexi-empty-sub strong { color: var(--dark-teal); }

/* ── Lexi window ── */
.lexi-window {
  background: #fff;
  overflow: hidden;
  display: flex;
  flex-direction: row;
  height: 760px;
}

/* Sidebar */
.lexi-sidebar {
  width: 54px;
  background: #2D3250;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 4px;
  flex-shrink: 0;
  align-self: stretch;
}
.lexi-sidebar-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.4);
  margin-bottom: 4px;
}
.lexi-sidebar-logo {
  width: 24px;
  height: 24px;
  display: block;
  object-fit: contain;
}
.lexi-sidebar-new {
  width: 32px; height: 32px;
  background: var(--teal);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px;
}
.lexi-sidebar-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.3);
}
.lexi-sidebar-icon.active {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.85);
}
.lexi-sidebar-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: #4A5278;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.7);
  margin-top: auto;
}

/* Main panel */
.lexi-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: #fff;
  overflow: hidden;
  height: 100%;
}

/* Breadcrumb bar */
.lexi-topbar {
  display: flex;
  align-items: center;
  padding: 13px 20px;
  border-bottom: 1px solid #ECEEF2;
  gap: 6px;
  flex-shrink: 0;
}
.lexi-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #9CA3B8;
}
.lexi-breadcrumb-sep { color: #C8CCE0; }
.lexi-breadcrumb-current { color: var(--dark-grey); font-weight: 500; }
.lexi-topbar-icons {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}
.lexi-topbar-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #9CA3B8;
}
.lexi-topbar-logo {
  height: 20px;
  width: auto;
  display: block;
  margin-left: 4px;
}

/* Chat body — fixed height, scrolls internally */
.lexi-body {
  flex: 1;
  min-height: 0;
  padding: 24px 28px 16px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  overflow-y: auto;
}
.lexi-body > * { flex-shrink: 0; }

/* User bubble */
.lexi-user-msg {
  display: flex;
  justify-content: flex-end;
  animation: msgIn 0.3s ease forwards;
  opacity: 0;
}
.lexi-user-bubble {
  background: #F4F5F7;
  border: 1px solid #E2E4EA;
  border-radius: 18px 18px 4px 18px;
  padding: 11px 18px;
  font-size: 14px;
  color: var(--dark-grey);
  max-width: 72%;
  line-height: 1.5;
}

/* Lexi response */
.lexi-response {
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: msgIn 0.3s ease forwards;
  opacity: 0;
}
.lexi-response-header {
  display: flex;
  align-items: center;
  gap: 8px;
}
.lexi-name-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--teal);
}
.lexi-response-body {
  padding-left: 30px;
  font-size: 14px;
  color: var(--dark-grey);
  line-height: 1.65;
}
.lexi-response-body p { margin-bottom: 8px; }
.lexi-response-body p:last-child { margin-bottom: 0; }

.lexi-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--dark-grey);
  margin: 4px 0 10px 30px;
}
.lexi-bullets {
  padding-left: 30px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.lexi-bullet {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 14px;
  color: var(--dark-grey);
  line-height: 1.55;
}
.lexi-bullet-dot {
  width: 6px; height: 6px;
  background: var(--teal);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 8px;
}
.lexi-bullet strong { font-weight: 600; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.stream-child {
  opacity: 0;
  animation: fadeUp 0.45s ease forwards;
}

/* Typing indicator */
.lexi-typing {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 30px;
  animation: msgIn 0.25s ease forwards;
  opacity: 0;
}
.lexi-typing-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.typing-dot {
  width: 6px; height: 6px;
  background: #C8CCE0;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* Input bar */
.lexi-inputbar {
  padding: 12px 20px 16px;
  flex-shrink: 0;
  background: #fff;
}
.lexi-input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #F4F5F7;
  border: 1px solid #E2E4EA;
  border-radius: 12px;
  padding: 10px 14px;
}
.lexi-input {
  flex: 1;
  font-size: 14px;
  color: #9CA3B8;
  font-family: 'Rubik', sans-serif;
  pointer-events: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: none;
}
.lexi-input-icons {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #C8CCE0;
}
.lexi-send {
  width: 30px; height: 30px;
  background: #E2E4EA;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.lexi-send svg { width: 14px; height: 14px; }

/* ── Rich report blocks (flagship answer) ── */
.lexi-step {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 30px;
  padding: 8px 12px;
  font-size: 13px;
  color: #6b7190;
  background: var(--light-fawn);
  border: 1px solid var(--fawn);
  border-radius: 8px;
  width: fit-content;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.lexi-step:hover { background: var(--fawn); }
.lexi-step.static { cursor: default; }
.lexi-step.static:hover { background: var(--light-fawn); }
.lexi-step svg { width: 14px; height: 14px; color: var(--teal); flex-shrink: 0; }
.lexi-step .chev { margin-left: 2px; color: #C8CCE0; transition: transform 0.15s; }
.lexi-step.open .chev { transform: rotate(180deg); }

.lexi-step-detail {
  margin-left: 30px;
  margin-top: -2px;
  border: 1px solid transparent;
  border-top: none;
  border-radius: 0 0 8px 8px;
  background: #fff;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.2s ease;
}
.lexi-step-detail.open {
  max-height: 320px;
  border-color: var(--fawn);
}
.lexi-step-detail pre {
  margin: 0;
  padding: 12px 14px;
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--dark-grey);
  white-space: pre-wrap;
  word-break: break-word;
  overflow-y: auto;
  max-height: 320px;
}
.lexi-step-detail .q-label {
  display: block;
  font-family: 'Rubik', sans-serif;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dark-fawn);
  padding: 8px 14px 0;
}

.lexi-viz {
  margin-left: 30px;
  border: 1px solid var(--fawn);
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
  flex-shrink: 0;
}
.lexi-viz-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--fawn);
  background: #FAFAF9;
}
.lexi-viz-head svg { width: 15px; height: 15px; color: #9CA3B8; flex-shrink: 0; }
.lexi-viz-title { font-size: 13px; font-weight: 600; color: var(--dark-grey); }
.lexi-viz-expand { margin-left: auto; color: #C8CCE0; }
.lexi-viz-expand svg { width: 14px; height: 14px; }
.lexi-viz-sub {
  padding: 8px 14px;
  font-size: 12.5px;
  color: #9CA3B8;
  border-bottom: 1px solid var(--fawn);
}
.lexi-viz-body { padding: 14px; }
.lexi-viz-body.chart { height: 260px; padding: 14px 14px 10px; }
.lexi-chart-canvas { width: 100%; height: 100%; display: block; }

/* Data table */
.lexi-table-wrap { overflow-x: auto; }
.lexi-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.lexi-table th {
  padding: 8px 12px;
  font-weight: 600;
  background: var(--fawn);
  border-bottom: 1px solid #DED9D5;
  white-space: nowrap;
  color: var(--dark-grey);
}
.lexi-table th.num, .lexi-table td.num { text-align: right; }
.lexi-table th.txt, .lexi-table td.txt { text-align: left; }
.lexi-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--fawn);
  white-space: nowrap;
  color: var(--dark-grey);
}
.lexi-table tr:last-child td { border-bottom: none; }

/* Report markdown */
.lexi-report { padding-left: 30px; }
.lexi-report h2 {
  font-size: 19px;
  font-weight: 600;
  color: var(--dark-grey);
  margin: 18px 0 10px;
}
.lexi-report h3 {
  font-size: 15.5px;
  font-weight: 600;
  color: var(--dark-grey);
  margin: 18px 0 8px;
}
.lexi-report h4 {
  font-size: 14px;
  font-weight: 600;
  color: var(--dark-grey);
  margin: 14px 0 6px;
}
.lexi-report p {
  font-size: 14px;
  color: var(--dark-grey);
  line-height: 1.65;
  margin-bottom: 10px;
}
.lexi-report ul, .lexi-report ol {
  padding-left: 22px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
/* Assumptions list needs native numbering + nested disc bullets */
.lexi-report ol.assume {
  display: block;
  list-style: decimal outside;
  padding-left: 24px;
  margin-bottom: 14px;
}
.lexi-report ol.assume > li {
  display: list-item;
  margin-bottom: 10px;
}
.lexi-report ol.assume ul {
  display: block;
  list-style: disc outside;
  padding-left: 22px;
  margin: 6px 0 4px;
}
.lexi-report ol.assume ul li {
  display: list-item;
  margin-bottom: 3px;
}
.lexi-report li {
  font-size: 14px;
  color: var(--dark-grey);
  line-height: 1.55;
}
.lexi-report strong { font-weight: 600; }
.lexi-report hr {
  border: none;
  border-top: 1px solid var(--fawn);
  margin: 18px 0;
}
.lexi-report h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--dark-grey);
  margin: 22px 0 12px;
}
/* General report lists: show markers, allow nesting */
.lexi-report ul:not(.assume ul) { list-style: disc outside; }
.lexi-report ol:not(.assume) { list-style: decimal outside; }
.lexi-report ul, .lexi-report ol {
  display: block;
  padding-left: 24px;
  margin-bottom: 12px;
}
.lexi-report li { display: list-item; margin-bottom: 4px; }
.lexi-report li > ul, .lexi-report li > ol { margin: 5px 0 6px; }
/* Tables embedded inside report writeups */
.lexi-report .rep-table {
  overflow-x: auto;
  margin: 6px 0 16px;
}
.lexi-report .rep-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.lexi-report .rep-table th {
  text-align: left;
  font-weight: 600;
  color: var(--dark-grey);
  background: var(--light-fawn);
  padding: 7px 10px;
  border-bottom: 1px solid var(--fawn);
  white-space: nowrap;
}
.lexi-report .rep-table td {
  padding: 7px 10px;
  color: var(--dark-grey);
  border-bottom: 1px solid var(--fawn);
}
.lexi-report .rep-table tr:last-child td { border-bottom: none; }
/* Footnote under a chart (for derived values) */
.lexi-viz-foot {
  font-size: 11px;
  color: var(--dark-fawn);
  font-style: italic;
  padding: 6px 12px 10px;
  line-height: 1.4;
}

/* ── Workflow cards (chat 5: segment / channel / activation) ── */
.lexi-card {
  border: 1px solid var(--fawn);
  border-radius: 14px;
  background: #fff;
  overflow: hidden;
  margin-top: 4px;
  box-shadow: 0 1px 3px rgba(58,64,91,0.04);
}
.lexi-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--fawn);
}
.lexi-card-head svg { width: 15px; height: 15px; color: var(--teal); flex-shrink: 0; }
.lexi-card-title { font-size: 14px; font-weight: 600; color: var(--dark-grey); }
.lexi-card-body { padding: 14px; }
.lexi-card-desc { font-size: 13px; color: #6b7190; line-height: 1.55; margin: 0; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 12px;
}
.kpi-grid.two { grid-template-columns: repeat(2, 1fr); }
.kpi-label { font-size: 11px; color: var(--dark-fawn); display: block; line-height: 1.3; }
.kpi-value { font-size: 18px; font-weight: 700; color: var(--dark-grey); line-height: 1.3; }

/* integration / channel rows */
.chan-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  padding: 3px 0;
}
.chan-row .lbl { color: #6b7190; }
.chan-row .val { font-weight: 600; color: var(--dark-grey); }
.chan-badge {
  width: 22px; height: 22px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.chan-active {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; color: #1a9e7a;
}
.chan-active::before { content: '●'; font-size: 9px; }

/* match-rate bar */
.match-bar {
  width: 100%; height: 7px; border-radius: 99px;
  background: var(--fawn); overflow: hidden; margin-top: 6px;
}
.match-bar > span { display: block; height: 100%; border-radius: 99px; background: var(--teal); }

/* status pill */
.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600; color: #1a9e7a;
}

/* insight box */
.insight-box {
  background: rgba(0,190,183,0.06);
  border: 1px solid rgba(0,190,183,0.2);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.55;
  margin-top: 4px;
}
.insight-box .ib-label { font-weight: 600; color: var(--dark-teal); margin-right: 4px; }

/* static suggestion chips */
.lexi-chips { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
.lexi-chips-head { font-size: 14px; font-weight: 600; color: var(--dark-grey); margin-bottom: 4px; }
.lexi-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px; border-radius: 9px;
  font-size: 13px; color: var(--dark-grey);
  cursor: default; text-align: left;
}
.lexi-chip:first-of-type { /* primary action chip */ }
.lexi-chip-ic {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--fawn);
}
.lexi-chip-ic svg { width: 14px; height: 14px; }
.lexi-chip-ic.teal { background: rgba(0,190,183,0.15); }
.lexi-chip-ic.teal svg { color: var(--dark-teal); }
.lexi-chip-ic.violet { background: rgba(124,92,246,0.15); }
.lexi-chip-ic.violet svg { color: #7c5cf6; }
.lexi-chip-ic.blue { background: rgba(73,149,200,0.15); }
.lexi-chip-ic.blue svg { color: #3573a8; }
.lexi-chip-ic.green { background: rgba(26,158,122,0.15); }
.lexi-chip-ic.green svg { color: #1a9e7a; }

/* ── Card interactive controls ── */
.lexi-card-head .card-edit {
  margin-left: auto; flex-shrink: 0;
  width: 26px; height: 26px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: none; cursor: pointer;
  color: var(--dark-fawn); transition: background .15s, color .15s;
}
.lexi-card-head .card-edit:hover { background: var(--fawn); color: var(--dark-grey); }
.lexi-card-head .card-edit svg { width: 14px; height: 14px; }
.lexi-card.editing { box-shadow: 0 0 0 2px var(--teal); }
.lexi-card.editing .card-edit { background: rgba(0,190,183,0.15); color: var(--dark-teal); }

.chan-row svg.row-ic { width: 13px; height: 13px; color: var(--dark-fawn); flex-shrink: 0; }
.chan-row .lbl { display: inline-flex; align-items: center; gap: 6px; }

/* dropdown selector */
.lexi-dd { position: relative; }
.lexi-dd-trig {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--fawn); border-radius: 7px;
  padding: 2px 8px; background: #fff; cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--dark-grey);
  font-family: inherit; transition: border-color .15s;
}
.lexi-dd-trig:hover { border-color: var(--teal); }
.lexi-dd-trig svg { width: 11px; height: 11px; color: var(--dark-fawn); transition: transform .15s; }
.lexi-dd.open .lexi-dd-trig svg { transform: rotate(180deg); }
.lexi-dd.open .lexi-dd-trig { border-color: var(--teal); }
.lexi-dd-menu {
  position: absolute; top: calc(100% + 4px); right: 0; z-index: 30;
  min-width: 100%; white-space: nowrap;
  background: #fff; border: 1px solid var(--fawn); border-radius: 9px;
  box-shadow: 0 6px 20px rgba(58,64,91,0.12);
  padding: 4px; display: none;
}
.lexi-dd.open .lexi-dd-menu { display: block; }
.lexi-dd-opt {
  padding: 6px 10px; border-radius: 6px; font-size: 12px;
  color: var(--dark-grey); cursor: pointer;
}
.lexi-dd-opt:hover { background: var(--fawn); }
.lexi-dd-opt.sel { color: var(--dark-teal); font-weight: 600; }

/* configuration collapsible */
.cfg-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer; padding: 0;
  font-family: inherit; font-size: 14px; font-weight: 600; color: var(--dark-grey);
  margin-top: 8px;
}
.cfg-toggle svg.gear { width: 15px; height: 15px; color: var(--dark-fawn); }
.cfg-toggle svg.chev { width: 15px; height: 15px; color: var(--dark-fawn); transition: transform .15s; }
.cfg-toggle.open svg.chev { transform: rotate(180deg); }
.cfg-panel {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .3s ease, opacity .2s ease, margin .3s ease;
}
.cfg-panel.open { max-height: 600px; opacity: 1; margin-top: 12px; }

/* rule-builder groups */
.rule-group { margin-bottom: 12px; }
.rule-group:last-child { margin-bottom: 0; }
.rule-group-label {
  font-size: 13px; color: var(--dark-fawn); margin-bottom: 8px;
}
.rule-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.rule-row:last-child { margin-bottom: 0; }
.rule-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px; border-radius: 7px;
  font-size: 13px; font-weight: 600; line-height: 1.2;
}
.rule-tag svg { width: 13px; height: 13px; flex-shrink: 0; }
.rule-tag.violet { background: rgba(124,92,246,0.12); color: #6b46d4; }
.rule-tag.rose   { background: rgba(220,60,80,0.10);  color: #c33444; }
.rule-op  { font-size: 13px; color: var(--dark-fawn); }
.rule-val { font-size: 14px; color: var(--dark-grey); }

.cfg-section-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; color: var(--dark-fawn);
  margin-bottom: 4px;
}
.cfg-section-label svg { width: 12px; height: 12px; }


/* eligible-sync legend dots */
.kpi-dot { width: 8px; height: 8px; border-radius: 99px; display: inline-block; margin-right: 5px; }
.kpi-dot.fill { background: var(--teal); }
.kpi-dot.empty { background: rgba(160,152,145,0.4); }

/* saved button (activation footer) */
.card-foot {
  padding: 10px 14px; border-top: 1px solid var(--fawn);
  display: flex; align-items: center; gap: 8px;
}
.btn-saved {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--teal); color: #fff; border: none;
  border-radius: 99px; padding: 6px 14px; font-size: 12px; font-weight: 600;
  font-family: inherit; cursor: default;
}
.btn-saved svg { width: 13px; height: 13px; }


</style>
</head>

<h2>💰 PERSONA 3: BARGAIN HUNTERS (5,362 customers | $3.73M revenue)</h2>

<h4>1. Margin Protection Strategy</h4>
<ul>

<li>Tiered discounts: "Spend $150+ get 15% off, $200+ get 20% off" (drives basket size)</li>

</ul>
<h4>2. Value-Based Messaging Shift</h4>
<ul>

<li>Shift from "% OFF" to "Free Shipping on $100+" or "Buy 2, Get Free Gift"</li>
<li>Highlight total cost-per-wear for premium items</li>
<li><strong>Goal:</strong> Reduce price focus in communication</li>
</ul>
<h4>3. Scarcity &amp; Urgency (Non-Discount)</h4>
<ul>
<li>"Limited stock" or "New arrivals selling fast" messaging</li>

<li>Exclusive colorways or styles for email subscribers</li>

<h4>4. Loyalty Points Program</h4>

// --- Scroll ownership (module scope) ------------------------------------
// Stateless and race-proof: auto-follow only nudges the view when the viewer
// is *currently* near the bottom. The instant they scroll up to read, every
// Auto-follow keeps the newest content in view during autoplay. It stops only
// when the *user* deliberately scrolls up to read, and resumes when they come
// back to the bottom. We track genuine user intent with a flag set by real
// wheel/touch/keyboice scroll, instead of inferring it from scroll distance
// (which breaks when a long report grows faster than we can nudge).
const NEAR_BOTTOM = 140; // px: counts as "parked at the bottom"
let userOwnsScroll = false;
function followBottom(el) {
  if (userOwnsScroll) return;             // user is reading up-thread; leave them
  // Instant, not smooth: a smooth animation can outlive and override a user's
  // scroll-up mid-flight. Frequent small instant nudges read as smooth anyway.
  el.scrollTop = el.scrollHeight;
}
// Wire real user-scroll detection once. A wheel-up or touch-drag hands scroll
// ownership to the user; scrolling back to the bottom returns it to autoplay.
function armScrollOwnership(el) {
  if (el.__scrollArmed) return;
  el.__scrollArmed = true;
  const atBottom = () => (el.scrollHeight - el.scrollTop - el.clientHeight) <= NEAR_BOTTOM;
  // Any user-initiated scroll intent
  const yield_ = () => { if (!atBottom()) userOwnsScroll = true; };
  el.addEventListener('wheel', (e) => { if (e.deltaY < 0) userOwnsScroll = true; }, { passive: true });
  el.addEventListener('touchmove', yield_, { passive: true });
  el.addEventListener('keydown', (e) => {
    if (['ArrowUp','PageUp','Home'].includes(e.key)) userOwnsScroll = true;
  });
  // When they return to the bottom, resume auto-follow.
  el.addEventListener('scroll', () => { if (atBottom()) userOwnsScroll = false; }, { passive: true });

  // Catch-all safety net: some reports (e.g. Retention, VIP) stream in via
  // large multi-node HTML blocks — tables, nested lists, cascading list-item
  // fades — with more places a manual followBottom() call could be missed
  // than the simpler card/chip-based chats. Rather than rely on every call
  // site remembering to nudge the scroll, watch the body for any DOM change
  // (new nodes, opacity/style changes) and re-follow automatically. This
  // makes auto-scroll behaviour identical across every chat regardless of
  // which block types it happens to use.
  const mo = new MutationObserver(() => followBottom(el));
  mo.observe(el, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
}
// Kept for call-site compatibility; no binding needed any more.
function bindScrollOwnership() {}

// ── Canvas bar chart (matches the real product's ECharts look) ─────
// Product chart palette, sampled bar-by-bar from the live Lexi product.
// Single-series charts colour bars by index from this ordered palette,
// looping if there are more bars than colours.
const LEXI_PALETTE = ['#4995c8', '#e7c921', '#b45492', '#2b7480', '#e6692e', '#aed6d5', '#717aa7', '#144064'];

function drawBarChart(canvas, cfg) {
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 600;
  const cssH = canvas.clientHeight || 230;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, cssW, cssH);

  const padL = 52, padR = 12, padT = 26, padB = 46;
  const plotW = cssW - padL - padR;
  const plotH = cssH - padT - padB;
  const labels = cfg.labels;
  const series = cfg.series;

  let maxVal = 0;
  series.forEach(s => s.data.forEach(v => { if (v > maxVal) maxVal = v; }));
  const ticks = 5;
  const niceMax = niceCeil(maxVal);
  const yToPx = v => padT + plotH - (v / niceMax) * plotH;

  // gridlines + y labels
  ctx.strokeStyle = '#EEECEA';
  ctx.fillStyle = '#9CA3B8';
  ctx.font = '10px Rubik, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= ticks; i++) {
    const v = (niceMax / ticks) * i;
    const y = yToPx(v);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(cssW - padR, y); ctx.stroke();
    ctx.fillText(fmtAxis(v), padL - 6, y);
  }

  // bars
  const groupW = plotW / labels.length;
  labels.forEach((lab, gi) => {
    const single = cfg.chartType === 'single';
    const nBars = single ? 1 : series.length;
    const barGap = 4;
    const groupPad = groupW * 0.22;
    const usable = groupW - groupPad * 2;
    const barW = (usable - barGap * (nBars - 1)) / nBars;
    const gx = padL + gi * groupW + groupPad;

    if (single) {
      const v = series[0].data[gi];
      const col = (series[0].colors && series[0].colors[gi])
        || (cfg.monochrome ? (series[0].color || LEXI_PALETTE[0]) : LEXI_PALETTE[gi % LEXI_PALETTE.length]);
      const y = yToPx(v);
      ctx.fillStyle = col;
      ctx.fillRect(gx, y, usable, padT + plotH - y);
    } else {
      series.forEach((s, si) => {
        const v = s.data[gi];
        const y = yToPx(v);
        ctx.fillStyle = s.color;
        ctx.fillRect(gx + si * (barW + barGap), y, barW, padT + plotH - y);
      });
    }

    // x label (supports \n)
    ctx.fillStyle = '#6b7190';
    ctx.font = '10px Rubik, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const cx = padL + gi * groupW + groupW / 2;
    String(lab).split('\n').forEach((line, li) => {
      ctx.fillText(line, cx, padT + plotH + 6 + li * 12);
    });
  });

  // legend (grouped only)
  if (cfg.chartType !== 'single') {
    let lx = padL;
    const ly = 10;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.font = '10px Rubik, sans-serif';
    series.forEach(s => {
      ctx.fillStyle = s.color;
      ctx.fillRect(lx, ly - 4, 9, 9);
      ctx.fillStyle = '#6b7190';
      ctx.fillText(s.name, lx + 13, ly);
      lx += 16 + ctx.measureText(s.name).width + 18;
    });
  }
}
function niceCeil(v) {
  if (v <= 0) return 1;
  const mag = Math.pow(10, Math.floor(Math.log10(v)));
  const norm = v / mag;
  let nice;
  if (norm <= 1) nice = 1; else if (norm <= 2) nice = 2;
  else if (norm <= 2.5) nice = 2.5; else if (norm <= 5) nice = 5; else nice = 10;
  return nice * mag;
}
function fmtAxis(v) {
  if (v >= 1000) return (v / 1000).toFixed(v % 1000 === 0 ? 0 : 1) + 'k';
  return String(Math.round(v));
}

}

// Wire up the interactive controls inside a workflow card: the Configuration
// collapsible, the edit pencil, and any dropdown selectors. Called once after
// a card block is appended.
function initCardControls(root) {
  // Configuration collapsibles
  root.querySelectorAll('.cfg-toggle').forEach(btn => {
    const panel = btn.nextElementSibling;
    btn.addEventListener('click', () => {
      const open = btn.classList.toggle('open');
      if (panel) panel.classList.toggle('open', open);
    });
  });

  // Edit pencil — toggles an "editing" highlight on the card it belongs to
  root.querySelectorAll('.card-edit').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.lexi-card');
      if (card) card.classList.toggle('editing');
    });
  });

  // Dropdown selectors. Options live in a sibling .lexi-dd-menu; selecting one
  // updates the trigger label and closes the menu.
  root.querySelectorAll('.lexi-dd').forEach(dd => {
    const trig = dd.querySelector('.lexi-dd-trig');
    const menu = dd.querySelector('.lexi-dd-menu');
    if (!trig || !menu) return;
    trig.addEventListener('click', (e) => {
      e.stopPropagation();
      // close any other open menus first
      document.querySelectorAll('.lexi-dd.open').forEach(o => { if (o !== dd) o.classList.remove('open'); });
      dd.classList.toggle('open');
    });
    menu.querySelectorAll('.lexi-dd-opt').forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const lbl = trig.querySelector('.lexi-dd-val');
        if (lbl) lbl.textContent = opt.textContent;
        menu.querySelectorAll('.lexi-dd-opt').forEach(o => o.classList.remove('sel'));
        opt.classList.add('sel');
        dd.classList.remove('open');
      });
    });
  });
}

// One global listener closes open dropdowns when clicking elsewhere.
if (!window.__lexiDDClose) {
  window.__lexiDDClose = true;
  document.addEventListener('click', () => {
    document.querySelectorAll('.lexi-dd.open').forEach(o => o.classList.remove('open'));
  });
}

function playRichReport(report) {
  report = report || FLAGSHIP_REPORT;
  clearTimers();
  const body = document.getElementById('lexi-body');
  const inputPrev = document.getElementById('lexi-input-preview');
  const breadcrumb = document.getElementById('lexi-breadcrumb-label');

  inputPrev.textContent = report.question.replace(/\n/g, ' ');
  if (breadcrumb) breadcrumb.textContent = report.ucLabel || 'Find my best customers';
  body.innerHTML = '';

  // --- Scroll ownership -------------------------------------------------
  // Auto-follow keeps newest content in view only while the viewer is parked
  // near the bottom. The moment they scroll up to read, follow() no-ops and
  // their spot holds; content keeps rendering below. Scrolling back down
  // resumes following. See followBottom() (stateless, race-proof).
  const follow = () => followBottom(body);
  // Back-compat aliases used by the block loop.
  const revealTop = follow;
  const revealBottom = follow;
  // Fresh chat: autoplay owns the scroll until the user grabs it.
  userOwnsScroll = false;
  armScrollOwnership(body);

  // Cumulative pacing: each block waits `gap` ms after the previous one
  // finished typing. Bigger blocks get a longer read pause before the next.
  let t = 200;
  const schedule = (fn, gap) => { t += gap; animTimers.push(setTimeout(fn, t)); };

  // initial user message
  schedule(() => {
    const um = document.createElement('div');
    um.className = 'lexi-user-msg';
    um.innerHTML = `<div class="lexi-user-bubble">${report.question.replace(/\n/g, '<br>')}</div>`;
    body.appendChild(um);
    revealBottom();
    animTimers.push(setTimeout(() => addTyping(body), 500));
  }, 300);

  // Estimate how long a report will spend streaming, so the block that
  // follows it waits for the streaming to finish instead of piling on top.
  function reportStreamMs(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const nodes = Array.from(tmp.childNodes).filter(n =>
      n.nodeType === 1 || (n.nodeType === 3 && n.textContent.trim() !== ''));
    if (nodes.length <= 2) return 0;
    let clock = 0;
    nodes.forEach((n) => {
      const tag = n.nodeType === 1 ? n.tagName.toLowerCase() : '';
      const isList = tag === 'ul' || tag === 'ol';
      const itemCount = isList ? n.querySelectorAll('li').length : 0;
      clock += isList ? Math.max(360, itemCount * 180 + 120) : 340;
    });
    return clock;
  }

  report.blocks.forEach((blk, i) => {
    // gap before this block appears (after the typing indicator shows)
    let gap;
    if (blk.type === 'step') gap = 700;
    else if (blk.type === 'chart') gap = 1800;
    else if (blk.type === 'table') gap = 1800;
    else if (blk.type === 'report') gap = 1500;
    else if (blk.type === 'card') gap = 1500;
    else if (blk.type === 'chips') gap = 700;
    else if (blk.type === 'user') gap = 1000;
    else gap = 1100; // text

    // A streaming report holds the floor until its last wave lands.
    const prev = report.blocks[i - 1];
    if (prev && prev.type === 'report') gap += reportStreamMs(prev.html);
    // Pills clustered together rattle off quickly instead of each taking a
    // full beat — tighter, less literal, better for a demo skim.
    if (blk.type === 'step' && prev && prev.type === 'step') gap = 320;
    // A one-line intro that only sets up a pill shouldn't get a full reading
    // pause; keep the intro→pill unit brisk.
    const next = report.blocks[i + 1];
    if (blk.type === 'text' && next && next.type === 'step') gap = 650;

    schedule(() => {
      removeTyping(body);
      let added;

      if (blk.type === 'user') {
        added = document.createElement('div');
        added.className = 'lexi-user-msg';
        added.innerHTML = `<div class="lexi-user-bubble">${blk.text}</div>`;
        body.appendChild(added);
        revealBottom();

      } else if (blk.type === 'step') {
        added = document.createElement('div');
        added.className = 'lexi-step' + (blk.static ? ' static' : '');
        if (blk.static) {
          added.innerHTML = `${STEP_ICON}<span>${blk.label}</span>`;
          body.appendChild(added);
        } else {
          added.innerHTML = `${STEP_ICON}<span>${blk.label}</span>${CHEV}`;
          const detail = document.createElement('div');
          detail.className = 'lexi-step-detail';
          detail.innerHTML = `<span class="q-label">${blk.qlabel || 'Query'}</span><pre>${blk.query || ''}</pre>`;
          added.addEventListener('click', () => {
            const open = added.classList.toggle('open');
            detail.classList.toggle('open', open);
          });
          body.appendChild(added);
          body.appendChild(detail);
        }
        revealBottom();

      } else if (blk.type === 'chart') {
        added = document.createElement('div');
        added.className = 'lexi-viz';
        added.innerHTML =
          `<div class="lexi-viz-head">${BAR_ICON}<span class="lexi-viz-title">${blk.title}</span><span class="lexi-viz-expand">${EXPAND_ICON}</span></div>` +
          `<div class="lexi-viz-sub">${blk.sub}</div>` +
          `<div class="lexi-viz-body chart"><canvas class="lexi-chart-canvas"></canvas></div>` +
          (blk.footnote ? `<div class="lexi-viz-foot">${blk.footnote}</div>` : '');
        body.appendChild(added);
        const cv = added.querySelector('canvas');
        requestAnimationFrame(() => { drawBarChart(cv, blk); revealTop(added); });

      } else if (blk.type === 'table') {
        added = document.createElement('div');
        added.className = 'lexi-viz';
        let thead = '<tr>' + blk.headers.map((h, j) =>
          `<th class="${blk.align[j]}">${h}</th>`).join('') + '</tr>';
        let tbody = blk.rows.map(r => '<tr>' + r.map((c, j) =>
          `<td class="${blk.align[j]}">${c}</td>`).join('') + '</tr>').join('');
        added.innerHTML =
          `<div class="lexi-viz-head">${TABLE_ICON}<span class="lexi-viz-title">${blk.title}</span><span class="lexi-viz-expand">${EXPAND_ICON}</span></div>` +
          `<div class="lexi-viz-sub">${blk.sub}</div>` +
          `<div class="lexi-table-wrap"><table class="lexi-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
        body.appendChild(added);
        revealTop(added);

      } else if (blk.type === 'report') {
        added = document.createElement('div');
        added.className = 'lexi-response';
        added.appendChild(lexiHeader());
        const rep = document.createElement('div');
        rep.className = 'lexi-report';
        added.appendChild(rep);
        body.appendChild(added);

        // Parse the report HTML into top-level nodes, then reveal them in
        // waves so a long writeup arrives as readable passages, not a wall.
        const tmp = document.createElement('div');
        tmp.innerHTML = blk.html;
        const nodes = Array.from(tmp.childNodes).filter(n =>
          n.nodeType === 1 || (n.nodeType === 3 && n.textContent.trim() !== ''));

        if (nodes.length <= 2) {
          // Very short report: show at once.
          nodes.forEach(n => rep.appendChild(n));
          follow();
        } else {
          // Reveal one node at a time so a long writeup arrives as readable
          // passages rather than a wall. Each paragraph, list, or heading is
          // its own wave. Cadence scales a little with node size so a big
          // bulleted list gets a beat to breathe, not an instant dump.
          let clock = 0;
          nodes.forEach((n) => {
            const tag = n.nodeType === 1 ? n.tagName.toLowerCase() : '';
            const isList = tag === 'ul' || tag === 'ol';
            const itemCount = isList ? n.querySelectorAll('li').length : 0;
            animTimers.push(setTimeout(() => {
              if (n.nodeType === 1) n.classList.add('stream-child');
              rep.appendChild(n);
              // A list reveals its items in sequence too, so bullets cascade.
              if (isList) {
                const lis = Array.from(n.children);
                lis.forEach((li, li_i) => {
                  li.style.opacity = '0';
                  animTimers.push(setTimeout(() => {
                    li.style.transition = 'opacity .25s ease';
                    li.style.opacity = '1';
                    follow();
                  }, li_i * 180));
                });
              }
              follow();
            }, clock));
            // gap before the NEXT node: lists take longer (their items cascade)
            clock += isList ? Math.max(360, itemCount * 180 + 120) : 340;
          });
        }

      } else if (blk.type === 'card') {
        // A Lexi response whose body is one or more rich workflow cards
        // (segment / channel / activation). Atomic, not streamed by heading.
        added = document.createElement('div');
        added.className = 'lexi-response';
        added.appendChild(lexiHeader());
        const bd = document.createElement('div');
        bd.className = 'lexi-response-body';
        bd.innerHTML = blk.html;
        added.appendChild(bd);
        body.appendChild(added);
        initCardControls(bd);
        follow();

      } else if (blk.type === 'chips') {
        // Static suggestion chips — shown for fidelity, not interactive.
        added = document.createElement('div');
        added.className = 'lexi-chips';
        let html = blk.head ? `<div class="lexi-chips-head">${blk.head}</div>` : '';
        html += blk.items.map(it =>
          `<div class="lexi-chip"><span class="lexi-chip-ic ${it.tone || ''}">${it.icon || ''}</span><span>${it.label}</span></div>`
        ).join('');
        added.innerHTML = html;
        body.appendChild(added);
        follow();

      } else { // text
        added = document.createElement('div');
        added.className = 'lexi-response';
        added.appendChild(lexiHeader());
        const bd = document.createElement('div');
        bd.className = 'lexi-response-body';
        bd.innerHTML = '<p>' + blk.html + '</p>';
        added.appendChild(bd);
        body.appendChild(added);
        revealBottom();
      }

      if (i < report.blocks.length - 1) {
        // No "Lexi is typing" before a tool-call pill — pills are actions,
        // not messages. After a streaming report, wait for it to nearly
        // finish so the dots don't sit on top of still-arriving text.
        let typingDelay;
        if (next && next.type === 'step') {
          typingDelay = null; // suppress typing indicator before pills
        } else if (blk.type === 'report') {
          typingDelay = reportStreamMs(blk.html) + 500;
        } else {
          typingDelay = 500;
        }
        if (typingDelay !== null) {
          animTimers.push(setTimeout(() => addTyping(body), typingDelay));
        }
      }
    }, gap);
  });
}

function playConversation(question, ucLabel) {
  if (REPORTS[question]) { playRichReport(REPORTS[question]); return; }
  if (question === FLAGSHIP_REPORT.question) { playRichReport(FLAGSHIP_REPORT); return; }
  clearTimers();
  const body = document.getElementById('lexi-body');
  const inputPrev = document.getElementById('lexi-input-preview');
  const breadcrumb = document.getElementById('lexi-breadcrumb-label');

  const conv = CONVERSATIONS[question] || DEFAULT_CONV;
  inputPrev.textContent = question;
  if (breadcrumb) breadcrumb.textContent = ucLabel;
  body.innerHTML = '';

  // User message
  animTimers.push(setTimeout(() => {
    const userMsg = document.createElement('div');
    userMsg.className = 'lexi-user-msg';
    const bub = document.createElement('div');
    bub.className = 'lexi-user-bubble';
    bub.textContent = question;
    userMsg.appendChild(bub);
    body.appendChild(userMsg);
    followBottom(body);
    setTimeout(() => addTyping(body), 350);
  }, 150));

  conv.messages.forEach((msg, i) => {
    const t = 150 + msg.delay;
    animTimers.push(setTimeout(() => {
      removeTyping(body);

      const resp = document.createElement('div');
      resp.className = 'lexi-response';

      // Header: icon + "Lexi" label
      const header = document.createElement('div');
      header.className = 'lexi-response-header';
      header.innerHTML = LEXI_ICON_SVG + '<span class="lexi-name-label">Lexi</span>';
      resp.appendChild(header);

      if (msg.isCard) {
        // Section title
        const title = document.createElement('div');
        title.className = 'lexi-section-title';
        title.textContent = msg.card.label;
        resp.appendChild(title);
        // Bullet list of data rows
        const bullets = document.createElement('div');
        bullets.className = 'lexi-bullets';
        msg.card.rows.forEach(r => {
          const b = document.createElement('div');
          b.className = 'lexi-bullet';
          b.innerHTML = `<div class="lexi-bullet-dot"></div><span><strong>${r.label}:</strong> ${r.val}${r.pill ? ' <span style="color:' + (r.pillType === 'good' ? '#087680' : '#B45309') + ';font-weight:500">— ' + r.pill + '</span>' : ''}</span>`;
          bullets.appendChild(b);
        });
        resp.appendChild(bullets);
      } else {
        const bodyEl = document.createElement('div');
        bodyEl.className = 'lexi-response-body';
        bodyEl.innerHTML = '<p>' + msg.text + '</p>';
        resp.appendChild(bodyEl);
      }

      body.appendChild(resp);
      followBottom(body);

      if (i < conv.messages.length - 1) {
        setTimeout(() => addTyping(body), 350);
      }
    }, t));
  });
}

renderChatNav();
openChat(0);
